name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=eks_comprehensive_debugger --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check eks_comprehensive_debugger.py

      - name: Run Ruff formatter check
        run: ruff format --check eks_comprehensive_debugger.py

      - name: Run MyPy type check
        run: mypy eks_comprehensive_debugger.py --ignore-missing-imports
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit security check
        run: bandit -r eks_comprehensive_debugger.py -ll -q
        continue-on-error: true

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JSON schema validator
        run: pip install jsonschema

      - name: Validate output schema
        run: |
          python -c "
          import json
          import jsonschema
          from pathlib import Path
          
          # Validate schema file is valid JSON
          schema_path = Path('schemas/output_schema.json')
          if not schema_path.exists():
              raise FileNotFoundError(f'Schema file not found: {schema_path}')
          
          with open(schema_path) as f:
              schema = json.load(f)
          
          # Validate schema structure
          if '\$schema' not in schema:
              raise ValueError('Schema missing \$schema property')
          
          # Validate with meta-schema
          jsonschema.Draft7Validator.check_schema(schema)
          
          print('✅ JSON schema validation passed')
          "

      - name: Validate LLM JSON schema
        run: |
          python -c "
          import json
          
          # Extract and validate LLM JSON schema from code
          with open('eks_comprehensive_debugger.py') as f:
              content = f.read()
          
          # Find LLM_JSON_SCHEMA definition
          import re
          match = re.search(r'LLM_JSON_SCHEMA = \"\"\"(.+?)\"\"\"', content, re.DOTALL)
          if match:
              schema_str = match.group(1)
              schema = json.loads(schema_str)
              print('✅ LLM JSON schema is valid')
          else:
              print('⚠️  LLM_JSON_SCHEMA not found in code')
          "

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          pip install twine
          twine check dist/*
